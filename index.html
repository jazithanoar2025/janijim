<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jazit">
<meta name="theme-color" content="#08345E">
<title>Jazit Hanoar</title>
<link rel="apple-touch-icon" id="pwa-icon">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#0B4F8A;--gl:#EDF6FF;--gd:#08345E;
  --r:#C94444;--rl:#FEF0F0;
  --a:#78AEE8;--al:#F0F7FF;
  --b:#1D74C7;--bl:#EAF4FF;
  --bg:#F4F8FD;--card:#FFFFFF;--bd:#D6E6F7;
  --t1:#102033;--t2:#56677C;--t3:#91A6BD;
  --rad:20px;--rads:14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--t1)}
#auth{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:200;
  background:#08345E;
  background-image:radial-gradient(circle at 20% 10%,rgba(150,211,255,.35),transparent 30%),radial-gradient(circle at 80% 90%,rgba(29,116,199,.5),transparent 35%)}
.a-logo{width:86px;height:86px;background:#fff;border-radius:26px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:18px;box-shadow:0 18px 40px rgba(0,0,0,.2)}
.a-logo img{width:100%;height:100%;object-fit:cover}
.a-title{font-size:30px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
.a-sub{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:36px}
.a-card{background:#fff;border-radius:22px;padding:28px 24px;width:100%;max-width:370px;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.a-err{color:var(--r);font-size:13px;margin-bottom:12px;text-align:center;min-height:18px}
.a-lbl{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.a-inp{width:100%;padding:13px 15px;font-size:16px;border:1.5px solid var(--bd);border-radius:var(--rads);background:#f9fafb;color:var(--t1);margin-bottom:14px;outline:none;transition:border .15s;font-family:inherit}
.a-inp:focus{border-color:var(--g);background:#fff}
.a-btn{width:100%;padding:14px;background:var(--g);color:#fff;font-size:16px;font-weight:700;border:none;border-radius:var(--rads);cursor:pointer;font-family:inherit}
.a-btn:active{opacity:.88}
#app{position:fixed;inset:0;display:none;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg)}
.topbar{background:#fff;padding:12px 16px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.tb-info{display:flex;flex-direction:column}
.tb-title{font-size:19px;font-weight:900;color:var(--gd);letter-spacing:-.3px}
.tb-sub{font-size:11px;color:var(--t2);margin-top:2px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:6px}
.rpill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.rpa{background:var(--gl);color:var(--gd)}.rpr{background:var(--bl);color:#08345E}
.icbtn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-family:inherit}
.icbtn.sp{animation:spin .7s linear infinite}
.screens{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}
.screen{display:none;animation:fadeIn .2s ease}.screen.active{display:block}
.bnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bd);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:10}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;border:none;background:transparent;font-family:inherit}
.ni-ic{font-size:22px;line-height:1;transition:transform .15s}
.ni-lb{font-size:10px;font-weight:600;color:var(--t3)}
.ni.active .ni-lb{color:var(--g)}.ni.active .ni-ic{transform:scale(1.12)}
.slb{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
.card{background:var(--card);border-radius:var(--rad);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.cb{padding:14px 16px}
.mg{display:grid;gap:10px;margin-bottom:10px}
.mg2{grid-template-columns:repeat(2,minmax(0,1fr))}.mg3{grid-template-columns:repeat(3,minmax(0,1fr))}
.mt{background:var(--card);border-radius:var(--rads);border:1px solid var(--bd);padding:14px 10px;text-align:center}
.mv{font-size:26px;font-weight:800;color:var(--t1);line-height:1}
.ml{font-size:11px;color:var(--t2);margin-top:3px}
.mv-g{color:var(--g)}.mv-r{color:var(--r)}.mv-a{color:var(--a)}
.krow{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.krow:last-child{border-bottom:none}.krow:active{background:#f0f7ff}
.av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.av1{background:#BAD7F8;color:#08345E}.av2{background:#9FE1CB;color:#064e3b}
.av3{background:#FDE68A;color:#78350f}.av4{background:#FCA5A5;color:#7f1d1d}.av5{background:#C4B5FD;color:#3b0764}
.ki{flex:1;min-width:0}
.kn{font-size:15px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.km{font-size:12px;color:var(--t2);margin-top:2px}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pg{background:var(--gl);color:var(--gd)}.pr{background:var(--rl);color:#7f1d1d}
.pa{background:var(--al);color:#3a5a7a}.pb{background:var(--bl);color:#08345E}
.pz{background:#f3f4f6;color:#374151}
.sbox{background:var(--card);border-radius:var(--rad);border:1px solid var(--bd);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.sbox:active{border-color:var(--g)}
.sic{width:46px;height:46px;background:var(--gl);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sinf{flex:1;min-width:0}.sd{font-size:16px;font-weight:800;color:var(--t1)}.sm{font-size:12px;color:var(--t2);margin-top:2px}
.sch{font-size:13px;font-weight:700;color:var(--g)}
.acard{background:var(--card);border-radius:var(--rad);border:1px solid var(--bd);margin-bottom:10px;padding:14px 16px;transition:border-color .15s}
.acard.saved{border-color:#cce8cc}
.aname{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:10px;display:flex;align-items:center;gap:9px}
.tg{display:flex;gap:6px;margin-bottom:7px}
.tb{flex:1;padding:9px 6px;font-size:13px;font-weight:700;border:1.5px solid var(--bd);border-radius:var(--rads);cursor:pointer;background:transparent;color:var(--t2);text-align:center;font-family:inherit;transition:all .15s}
.tb.tsi{background:var(--gl);border-color:var(--g);color:var(--gd)}
.tb.tno{background:var(--rl);border-color:var(--r);color:#7f1d1d}
.tb.tpa{background:var(--bl);border-color:var(--b);color:#08345E}
.db{background:var(--rl);border-radius:var(--rads);padding:8px 12px;font-size:12px;color:#7f1d1d;font-weight:600;margin-top:6px}
.saving-dot{width:8px;height:8px;border-radius:50%;background:var(--a);animation:spin .8s linear infinite;display:inline-block;margin-left:6px;vertical-align:middle}
.ov{display:none;position:fixed;inset:0;background:rgba(8,52,94,.5);z-index:100;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.mo{background:#fff;border-radius:22px 22px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.mo-h{width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 18px}
.mo-t{font-size:19px;font-weight:800;color:var(--t1);margin-bottom:18px}
.fl{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid var(--bd);border-radius:var(--rads);background:#f9fafb;color:var(--t1);margin-bottom:13px;outline:none;font-family:inherit}
.fi:focus{border-color:var(--g);background:#fff}
.bp{width:100%;padding:14px;background:var(--g);color:#fff;font-size:16px;font-weight:700;border:none;border-radius:var(--rads);cursor:pointer;margin-top:4px;font-family:inherit}
.bp:active{opacity:.88}
.bs{width:100%;padding:13px;background:transparent;color:var(--t1);font-size:15px;font-weight:600;border:1.5px solid var(--bd);border-radius:var(--rads);cursor:pointer;margin-top:8px;font-family:inherit}
.rn{width:28px;height:28px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.rn1{background:#fde68a;color:#78350f}.rn2{background:#e5e7eb;color:#374151}.rn3{background:#fed7aa;color:#7c2d12}
.hd{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hdg{background:var(--g)}.hdr{background:var(--r)}.hdz{background:var(--t3)}
.gbar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:7px}
.gbf{height:100%;background:var(--g);border-radius:4px;transition:width .5s}
.empty{text-align:center;padding:48px 20px;color:var(--t2)}
.eic{font-size:52px;margin-bottom:12px}
.fab{position:fixed;bottom:72px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--g);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;box-shadow:0 4px 20px rgba(11,79,138,.4);z-index:40}
.fab:active{transform:scale(.92)}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(0);background:#102033;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.info-row{font-size:13px;color:var(--t2);margin-bottom:8px;padding:8px 12px;background:var(--bg);border-radius:10px;display:flex;align-items:center;gap:8px}
.yr-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .15s}
.yr-btn.active{background:var(--g);color:#fff;border-color:var(--g)}
.section-divider{height:1px;background:var(--bd);margin:16px 0}
</style>
</head>
<body>

<div id="auth">
  <div class="a-logo"><img id="auth-logo" src="" alt="Jazit Hanoar"></div>
  <div class="a-title">Jazit Hanoar</div>
  <div class="a-sub">El gigante de Rivera</div>
  <div class="a-card">
    <div class="a-err" id="aerr"></div>
    <label class="a-lbl">Usuario</label>
    <input class="a-inp" id="lemail" type="text" placeholder="tu@email.com" autocomplete="email" autocapitalize="none" autocorrect="off">
    <label class="a-lbl">Contrasena</label>
    <input class="a-inp" id="lpass" type="password" placeholder="********">
    <button class="a-btn" id="lbtn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-info">
      <div class="tb-title" id="tbt">Jazit Hanoar</div>
      <div class="tb-sub" id="tbs"></div>
    </div>
    <div class="tb-right">
      <span class="rpill" id="rpill"></span>
      <button class="icbtn" id="rbtn" onclick="reloadData()">&#8635;</button>
      <button class="icbtn" onclick="doLogout()">&#8617;</button>
    </div>
  </div>
  <div class="screens" id="screens">
    <div id="s-hoy"    class="screen active"></div>
    <div id="s-ninos"  class="screen"></div>
    <div id="s-grupos" class="screen"></div>
    <div id="s-deuda"  class="screen"></div>
    <div id="s-stats"  class="screen"></div>
    <div id="s-admin"  class="screen"></div>
  </div>
  <nav class="bnav" id="bnav"></nav>
</div>

<button class="fab" id="fab" style="display:none" onclick="onFab()">+</button>

<!-- Modal sabados -->
<div class="ov" id="m-sab"><div class="mo">
  <div class="mo-h"></div><div class="mo-t">Elegir sabado</div>
  <div id="m-sab-list"></div>
  <button class="bs" onclick="cm('m-sab')">Cancelar</button>
</div></div>

<!-- Modal nuevo sabado -->
<div class="ov" id="m-nsab"><div class="mo">
  <div class="mo-h"></div><div class="mo-t">Nuevo sabado</div>
  <label class="fl">Fecha</label><input class="fi" id="ns-f" type="date">
  <label class="fl">Monto ($)</label><input class="fi" id="ns-m" type="number" value="100" min="0" step="50">
  <label class="fl">Observacion (opcional)</label><input class="fi" id="ns-o" placeholder="Ej: Actividad especial">
  <button class="bp" onclick="crearSabado()">Crear sabado</button>
  <button class="bs" onclick="cm('m-nsab')">Cancelar</button>
</div></div>

<!-- Modal nuevo janijim -->
<div class="ov" id="m-nn"><div class="mo">
  <div class="mo-h"></div><div class="mo-t">Agregar janijim</div>
  <label class="fl">Nombre</label><input class="fi" id="nn-n" placeholder="Nombre" autocapitalize="words">
  <label class="fl">Apellido</label><input class="fi" id="nn-a" placeholder="Apellido" autocapitalize="words">
  <label class="fl">Grupo</label>
  <select class="fi" id="nn-g" style="display:none"></select>
  <div id="nn-g-label" class="fi" style="display:none;font-weight:600;background:#f0f7ff;border-color:var(--g);cursor:default"></div>
  <label class="fl">Escuela / Liceo (opcional)</label><input class="fi" id="nn-esc" placeholder="Ej: Escuela 23" autocapitalize="words">
  <label class="fl">Telefono tutor (opcional)</label><input class="fi" id="nn-tel" type="tel" placeholder="+598...">
  <button class="bp" onclick="crearNino()">Guardar</button>
  <button class="bs" onclick="cm('m-nn')">Cancelar</button>
</div></div>

<!-- Modal detalle janijim -->
<div class="ov" id="m-kid"><div class="mo">
  <div class="mo-h"></div>
  <div id="m-kid-body"></div>
  <button class="bs" onclick="cm('m-kid')">Cerrar</button>
</div></div>

<!-- Modal editar janijim -->
<div class="ov" id="m-edit"><div class="mo">
  <div class="mo-h"></div><div class="mo-t">Editar janijim</div>
  <input type="hidden" id="edit-nid">
  <label class="fl">Nombre</label><input class="fi" id="edit-n" placeholder="Nombre" autocapitalize="words">
  <label class="fl">Apellido</label><input class="fi" id="edit-a" placeholder="Apellido" autocapitalize="words">
  <label class="fl">Escuela / Liceo</label><input class="fi" id="edit-esc" placeholder="Ej: Escuela 23" autocapitalize="words">
  <label class="fl">Telefono tutor</label><input class="fi" id="edit-tel" type="tel" placeholder="+598...">
  <label class="fl">Observaciones</label><input class="fi" id="edit-obs" placeholder="Notas adicionales">
  <button class="bp" onclick="saveEdit()">Guardar cambios</button>
  <button class="bs" onclick="cm('m-edit')">Cancelar</button>
</div></div>

<!-- Modal admin: gestionar grupos/contrasenas -->
<div class="ov" id="m-admin-grp"><div class="mo">
  <div class="mo-h"></div>
  <div class="mo-t" id="m-admin-grp-title">Editar grupo</div>
  <input type="hidden" id="ag-id">
  <label class="fl">Nombre del grupo</label><input class="fi" id="ag-nombre">
  <label class="fl">Contrasena del grupo</label><input class="fi" id="ag-pass" placeholder="Ej: leitza2026">
  <button class="bp" onclick="saveGrupoAdmin()">Guardar</button>
  <button class="bs" onclick="cm('m-admin-grp')">Cancelar</button>
</div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, collection, doc, getDocs, addDoc, updateDoc, setDoc,
  query, where, orderBy, writeBatch, onSnapshot, serverTimestamp, getDoc
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAwR5PcJzcXhbrkEj4FhGahy6lv-iGhL4M",
  authDomain: "jazit-hanoar-5392f.firebaseapp.com",
  projectId: "jazit-hanoar-5392f",
  storageBucket: "jazit-hanoar-5392f.firebasestorage.app",
  messagingSenderId: "961173858560",
  appId: "1:961173858560:web:514b66222d0ffe0de5abe5"
};
const fbApp = initializeApp(firebaseConfig);

var ME = null, SAB = null, TAB = 'hoy';
var DB = { usuarios:[], grupos:[], ninos:[], sabados:[] };
var REG = {}; // { sabadoId: { ninoId: {vino,pago,...} } }
var SAVING = {}; // ninoId -> timeout
var UNSUB = null; // firestore listener

// ── UTILS ──
var AVC = ['av1','av2','av3','av4','av5'];
function avc(id){var s=0;var str=String(id||'');for(var i=0;i<str.length;i++)s+=str.charCodeAt(i);return AVC[s%5];}
function ini(n){var a=(n.nombre||'')[0]||(n.apellido||'')[0]||'?';var b=(n.apellido||'')[0]||'';return(a+b).toUpperCase();}
var MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function fmt(d){if(!d)return'';var s=String(d).trim();if(!s)return'';if(/^\d{4}-\d{2}-\d{2}$/.test(s)){var p=s.split('-');return parseInt(p[2])+' '+MESES[parseInt(p[1])-1]+' '+p[0];}return s;}
function fmtYear(d){if(!d)return'';var s=String(d).trim();if(s.length>=4)return s.slice(0,4);return s;}
function toast(msg,dur){dur=dur||2500;var e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},dur);}
function om(id){document.getElementById(id).classList.add('open');}
function cm(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.ov').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');});});

// ── FIRESTORE LOAD ──
async function loadDB(){
  try{
    var [uS,gS,nS,sS]=await Promise.all([
      getDocs(collection(db,'usuarios')),
      getDocs(collection(db,'grupos')),
      getDocs(collection(db,'ninos')),
      getDocs(query(collection(db,'sabados'),orderBy('fecha','desc')))
    ]);
    DB.usuarios=uS.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    DB.grupos=gS.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    DB.ninos=nS.docs.filter(function(d){return d.data().activo!==false;}).map(function(d){return Object.assign({id:d.id},d.data());});
    DB.sabados=sS.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    if(DB.sabados.length&&!SAB)SAB=DB.sabados[0];
    if(SAB)SAB=DB.sabados.find(function(s){return s.id===SAB.id;})||DB.sabados[0];
    return true;
  }catch(e){console.error(e);return false;}
}

// ── REAL-TIME LISTENER ──
function subscribeRegistros(sabadoId){
  if(UNSUB){UNSUB();UNSUB=null;}
  if(!sabadoId)return;
  if(!REG[sabadoId])REG[sabadoId]={};
  var q=query(collection(db,'registros'),where('sabadoId','==',sabadoId));
  UNSUB=onSnapshot(q,function(snap){
    if(!REG[sabadoId])REG[sabadoId]={};
    snap.docChanges().forEach(function(change){
      var data=change.doc.data();
      if(change.type==='removed'){delete REG[sabadoId][data.ninoId];}
      else{REG[sabadoId][data.ninoId]=Object.assign({id:change.doc.id},data);}
    });
    if(TAB==='hoy')renderHoy();
  });
}

async function loadAllRegs(){
  try{
    var snap=await getDocs(collection(db,'registros'));
    snap.docs.forEach(function(d){
      var data=d.data();var sid=data.sabadoId;
      if(!REG[sid])REG[sid]={};
      REG[sid][data.ninoId]=Object.assign({id:d.id},data);
    });
  }catch(e){}
}

function getReg(sid,nid){return(REG[sid]||{})[nid]||null;}

function deudaT(nid){
  var total=0;
  Object.keys(REG).forEach(function(sid){
    var r=(REG[sid]||{})[nid];
    if(r&&r.vino&&!r.pago){var s=DB.sabados.find(function(x){return x.id===sid;});if(s)total+=Number(s.monto||0);}
  });
  return total;
}
function asistT(nid){
  var total=0;
  Object.keys(REG).forEach(function(sid){var r=(REG[sid]||{})[nid];if(r&&r.vino)total++;});
  return total;
}
function asistByYear(nid,year){
  var total=0;
  Object.keys(REG).forEach(function(sid){
    var s=DB.sabados.find(function(x){return x.id===sid;});
    if(s&&fmtYear(s.fecha)===String(year)){var r=(REG[sid]||{})[nid];if(r&&r.vino)total++;}
  });
  return total;
}
function sabadosByYear(year){
  return DB.sabados.filter(function(s){return fmtYear(s.fecha)===String(year);});
}
function allYears(){
  var ys={};
  DB.sabados.forEach(function(s){var y=fmtYear(s.fecha);if(y)ys[y]=1;});
  return Object.keys(ys).sort().reverse();
}
function misN(){
  if(ME.rol==='admin')return DB.ninos;
  return DB.ninos.filter(function(n){return n.grupoId===ME.grupoId;});
}

async function reloadData(){
  var b=document.getElementById('rbtn');b.classList.add('sp');
  await loadDB();await loadAllRegs();
  if(SAB)subscribeRegistros(SAB.id);
  b.classList.remove('sp');renderTab(TAB);toast('Datos actualizados');
}
window.reloadData=reloadData;

// ── AUTO-SAVE ──
function autoSave(nid,vino,pago){
  // Debounce: wait 600ms after last change before writing
  clearTimeout(SAVING[nid]);
  SAVING[nid]=setTimeout(async function(){
    var sid=SAB?SAB.id:null;if(!sid)return;
    var regId=sid+'_'+nid;
    var regRef=doc(db,'registros',regId);
    try{
      await setDoc(regRef,{sabadoId:sid,ninoId:nid,vino:vino,pago:pago,registradoPor:ME.email||ME.id,fechaHora:new Date().toISOString()},{merge:true});
      // Update local cache
      if(!REG[sid])REG[sid]={};
      REG[sid][nid]={id:regId,sabadoId:sid,ninoId:nid,vino:vino,pago:pago};
      // Visual feedback on the card
      var card=document.getElementById('card-'+nid);
      if(card){card.classList.add('saved');setTimeout(function(){card.classList.remove('saved');},1500);}
    }catch(e){toast('Error al guardar - reintenta');}
  },600);
}

// ── AUTH ──
async function doLogin(){
  var email=(document.getElementById('lemail').value||'').trim().toLowerCase();
  var pass=(document.getElementById('lpass').value||'').trim();
  var err=document.getElementById('aerr');
  var btn=document.getElementById('lbtn');
  err.textContent='';
  if(!email){err.textContent='Ingresa tu usuario';return;}
  btn.textContent='Verificando...';btn.disabled=true;
  var u=DB.usuarios.find(function(x){return x.email&&x.email.toLowerCase()===email;});
  if(!u){err.textContent='Usuario no registrado';btn.textContent='Entrar';btn.disabled=false;return;}
  // Check contrasena: individual user pass, OR grupo pass, OR default
  var grupoOk=false;
  if(u.grupoId){
    var g=DB.grupos.find(function(x){return x.id===u.grupoId;});
    if(g&&g.contrasena&&pass===g.contrasena)grupoOk=true;
  }
  var ok=(u.rol==='admin'&&pass==='admin123')||(u.contrasena&&pass===u.contrasena)||grupoOk||(pass==='janijim123');
  if(!ok){err.textContent='Contrasena incorrecta';btn.textContent='Entrar';btn.disabled=false;return;}
  ME=u;
  try{localStorage.setItem('jh_me_v3',JSON.stringify({id:u.id,email:u.email,rol:u.rol,nombre:u.nombre||'',grupoId:u.grupoId||''}));}catch(e){}
  showApp();
}
window.doLogin=doLogin;

function doLogout(){
  ME=null;SAB=null;if(UNSUB){UNSUB();UNSUB=null;}
  try{localStorage.removeItem('jh_me_v3');}catch(e){}
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';

// ── HOY (AUTO-SAVE) ──
function renderHoy(){
  var el=document.getElementById('s-hoy');
  if(!SAB){el.innerHTML='<div class="empty"><div class="eic">&#128197;</div><p>No hay sabados.<br>Toca + para crear el primero.</p></div>';return;}
  var sid=SAB.id;var mis=misN();var vin=0,pag=0;
  mis.forEach(function(n){var r=getReg(sid,n.id);if(r&&r.vino){vin++;if(r.pago)pag++;}});
  var html='<div class="sbox" onclick="openSM()">'
    +'<div class="sic">&#128197;</div>'
    +'<div class="sinf"><div class="sd">Sab. '+fmt(SAB.fecha)+'</div>'
    +'<div class="sm">$'+SAB.monto+(SAB.observacion?' - '+SAB.observacion:'')+'</div></div>'
    +'<div class="sch">Cambiar &rsaquo;</div></div>'
    +'<div class="mg mg3">'
    +'<div class="mt"><div class="mv">'+mis.length+'</div><div class="ml">Total</div></div>'
    +'<div class="mt"><div class="mv mv-g">'+vin+'</div><div class="ml">Vinieron</div></div>'
    +'<div class="mt"><div class="mv">'+pag+'</div><div class="ml">Pagaron</div></div>'
    +'</div>'
    +'<div class="slb">Lista <span style="font-size:10px;color:var(--b);font-weight:600">&#10003; Guardado automatico</span></div>';
  if(mis.length===0){html+='<div class="empty"><div class="eic">&#128102;</div><p>Sin janijim en este grupo.</p></div>';}
  else{
    mis.forEach(function(n){
      var r=getReg(sid,n.id);
      var v=r?r.vino:false;var p=r?r.pago:false;
      html+='<div class="acard" id="card-'+n.id+'">'
        +'<div class="aname"><div class="av '+avc(n.id)+'">'+ini(n)+'</div>'+n.nombre+' '+n.apellido+'</div>'
        +'<div class="tg">'
        +'<button class="tb'+(v?' tsi':'')+'" onclick="setV(\''+n.id+'\',true)">&#10003; Vino</button>'
        +'<button class="tb'+(!v&&r?' tno':'')+'" onclick="setV(\''+n.id+'\',false)">&#10007; Falto</button>'
        +'</div>'
        +(v?'<div class="tg">'
          +'<button class="tb'+(p?' tpa':'')+'" onclick="setP(\''+n.id+'\',true)">$ Pago</button>'
          +'<button class="tb'+(!p?' tno':'')+'" onclick="setP(\''+n.id+'\',false)">$ Debe</button>'
          +'</div>':'')
        +(v&&!p?'<div class="db">Deuda: $'+SAB.monto+' - '+fmt(SAB.fecha)+'</div>':'')
        +'</div>';
    });
  }

window.setV=function(nid,v){
  var sid=SAB?SAB.id:null;if(!sid)return;
  if(!REG[sid])REG[sid]={};
  var cur=REG[sid][nid]||{};
  var newV=v;var newP=v?cur.pago||false:false;
  REG[sid][nid]=Object.assign({},cur,{vino:newV,pago:newP});
  renderHoy();
  autoSave(nid,newV,newP);
};
window.setP=function(nid,p){
  var sid=SAB?SAB.id:null;if(!sid)return;
  if(!REG[sid])REG[sid]={};
  var cur=REG[sid][nid]||{vino:true};
  REG[sid][nid]=Object.assign({},cur,{pago:p});
  renderHoy();
  autoSave(nid,REG[sid][nid].vino,p);
};

  var d=deudaT(nid);var a=asistT(nid);

    +'<button class="pill pb" style="cursor:pointer;border:none" onclick="openEdit(\''+nid+'\')">&#9999; Editar</button></div>';

    +'<div class="mt"><div class="mv mv-g">'+a+'</div><div class="ml">Asistencias</div></div>'
    +'<div class="mt"><div class="mv '+(d>0?'mv-r':'mv-g')+'">$'+d+'</div><div class="ml">Deuda total</div></div>'
    +'</div><div class="slb">Historial</div><div class="card">';

  else{hist.forEach(function(h){
    var s=DB.sabados.find(function(x){return x.id===h.sid;});if(!s)return;var r=h.r;
    html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd)">'

// ── GRUPOS ──
function renderGrupos(){
  if(ME.rol!=='admin'){document.getElementById('s-grupos').innerHTML='';return;}
  var years=allYears();var selYear=window._gruposYear||years[0]||'';
  var totalDeuda=DB.ninos.reduce(function(s,n){return s+deudaT(n.id);},0);
  var html='<div class="mg mg3">'
    +'<div class="mt"><div class="mv">'+DB.grupos.length+'</div><div class="ml">Grupos</div></div>'
    +'<div class="mt"><div class="mv">'+DB.ninos.length+'</div><div class="ml">Janijim</div></div>'
    +'<div class="mt"><div class="mv mv-r">$'+totalDeuda+'</div><div class="ml">Deuda total</div></div>'
    +'</div>';
  if(years.length>1){
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
    years.forEach(function(y){html+='<button class="yr-btn'+(y===selYear?' active':'')+'" onclick="setGruposYear(\''+y+'\')">'+y+'</button>';});
    html+='</div>';
  }
  html+='<div class="slb">Por grupo'+(selYear?' - '+selYear:'')+'</div>';
  var sabsYear=selYear?sabadosByYear(selYear):DB.sabados;
  DB.grupos.forEach(function(g){
    var gn=DB.ninos.filter(function(n){return n.grupoId===g.id;});
    var dg=gn.reduce(function(s,n){return s+deudaT(n.id);},0);
    var resp=DB.usuarios.find(function(u){return u.id===g.responsableId;});
    var sid=SAB?SAB.id:'';
    var hoy=sid?gn.filter(function(n){var r=getReg(sid,n.id);return r&&r.vino;}).length:0;
    var pct=gn.length?Math.round(hoy/gn.length*100):0;
    // year stats
    var yearAsist=0;
    if(selYear){gn.forEach(function(n){yearAsist+=asistByYear(n.id,selYear);});}
    var avgYear=selYear&&sabsYear.length&&gn.length?(yearAsist/sabsYear.length).toFixed(1):null;
    html+='<div class="card cb" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'
      +'<div class="av '+avc(g.id)+'" style="border-radius:12px;width:44px;height:44px;font-size:16px">'+(g.nombre||'?')[0]+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:16px;font-weight:800">'+g.nombre+'</div>'
      +'<div style="font-size:12px;color:var(--t2)">'+(resp?resp.nombre||resp.email:'Sin resp.')+' - '+gn.length+' janijim</div></div>'
      +(dg>0?'<div style="text-align:right"><div style="font-size:16px;font-weight:800;color:var(--r)">$'+dg+'</div>'
        +'<div style="font-size:10px;color:var(--r);font-weight:600">deuda</div></div>'
        :'<span class="pill pg">Sin deuda</span>')
      +'</div>'
      +(sid?'<div style="font-size:12px;color:var(--t2);margin-bottom:4px;display:flex;justify-content:space-between">'
        +'<span>Asist. hoy</span><span style="font-weight:700;color:var(--t1)">'+hoy+'/'+gn.length+' ('+pct+'%)</span></div>'
        +'<div class="gbar"><div class="gbf" style="width:'+pct+'%"></div></div>':'')
      +(avgYear?'<div style="margin-top:10px;font-size:12px;color:var(--t2)">Promedio '+selYear+': <strong>'+avgYear+' asistentes por sabado</strong></div>':'')
      +'</div>';
  });
  document.getElementById('s-grupos').innerHTML=html;
}
window.setGruposYear=function(y){window._gruposYear=y;renderGrupos();};

// ── DEUDA ──
function renderDeuda(){
  var mis=misN();
  var deudores=mis.map(function(n){return Object.assign({},n,{_d:deudaT(n.id)});})
    .filter(function(n){return n._d>0;}).sort(function(a,b){return b._d-a._d;});
  var total=deudores.reduce(function(s,n){return s+n._d;},0);
  var html='<div class="mg mg2">'
    +'<div class="mt"><div class="mv mv-r">$'+total+'</div><div class="ml">Deuda total</div></div>'
    +'<div class="mt"><div class="mv">'+deudores.length+'</div><div class="ml">Con deuda</div></div>'
    +'</div><div class="slb">Ranking</div>';
  if(deudores.length===0){html+='<div class="empty"><div class="eic">&#127881;</div><p>Sin deudas pendientes</p></div>';}
  else{
    html+='<div class="card">';
    deudores.forEach(function(n,i){
      var g=DB.grupos.find(function(x){return x.id===n.grupoId;});
      html+='<div class="krow" onclick="kidD(\''+n.id+'\')">'
        +'<div class="rn '+(i===0?'rn1':i===1?'rn2':i===2?'rn3':'')+'">'+( i+1)+'</div>'
        +'<div class="av '+avc(n.id)+'">'+ini(n)+'</div>'
        +'<div class="ki"><div class="kn">'+n.nombre+' '+n.apellido+'</div>'
        +'<div class="km">'+(g?g.nombre:'-')+'</div></div>'
        +'<div style="font-size:18px;font-weight:800;color:var(--r)">$'+n._d+'</div></div>';
    });html+='</div>';
  }
  document.getElementById('s-deuda').innerHTML=html;
}

// ── STATS ──
function renderStats(){
  var mis=misN();
  var years=allYears();var selYear=window._statsYear||years[0]||'';
  var total=mis.reduce(function(s,n){return s+deudaT(n.id);},0);
  var ta=0;mis.forEach(function(n){ta+=asistT(n.id);});
  var prom=DB.sabados.length?(ta/DB.sabados.length).toFixed(1):'-';
  var html='<div class="mg mg2">'
    +'<div class="mt"><div class="mv">'+mis.length+'</div><div class="ml">Janijim activos</div></div>'
    +'<div class="mt"><div class="mv mv-g">'+ta+'</div><div class="ml">Total asistencias</div></div>'
    +'</div><div class="mg mg2">'
    +'<div class="mt"><div class="mv mv-a">'+prom+'</div><div class="ml">Prom por sabado</div></div>'
    +'<div class="mt"><div class="mv mv-r">$'+total+'</div><div class="ml">Deuda acumulada</div></div>'
    +'</div>';
  // Year filter
  if(years.length>0){
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">';
    years.forEach(function(y){html+='<button class="yr-btn'+(y===selYear?' active':'')+'" onclick="setStatsYear(\''+y+'\')">'+y+'</button>';});
    html+='<button class="yr-btn'+(''===selYear?' active':'')+'" onclick="setStatsYear(\'\')">Todo</button>';
    html+='</div>';
  }
  var sabsFilt=selYear?sabadosByYear(selYear):DB.sabados;
  // Escuela stats for filtered sabados
  var escuelas={};
  mis.forEach(function(n){var e=(n.escuela||'').trim()||'Sin registrar';escuelas[e]=(escuelas[e]||0)+1;});
  var escList=Object.entries(escuelas).sort(function(a,b){return b[1]-a[1];});
  // Asistencia por escuela in selected year
  var escAsist={};
  if(selYear){
    mis.forEach(function(n){
      var e=(n.escuela||'').trim()||'Sin registrar';
      if(!escAsist[e])escAsist[e]={asist:0,total:0};
      escAsist[e].total++;
      escAsist[e].asist+=asistByYear(n.id,selYear);
    });
  }
  if(escList.length>0&&!(escList.length===1&&escList[0][0]==='Sin registrar')){
    html+='<div class="slb">Distribucion por escuela'+(selYear?' ('+selYear+')':'')+'</div>';
    escList.forEach(function(entry){
      var esc=entry[0],cnt=entry[1];
      var pct=Math.round(cnt/(mis.length||1)*100);
      var avgLine='';
      if(selYear&&escAsist[esc]&&sabsFilt.length){
        var avg=(escAsist[esc].asist/sabsFilt.length).toFixed(1);
        avgLine='<div style="font-size:11px;color:var(--t2);margin-top:4px">Prom asistencia '+selYear+': '+avg+' por sabado</div>';
      }
      html+='<div class="card cb" style="margin-bottom:8px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        +'<div style="font-size:14px;font-weight:700">'+esc+'</div>'
        +'<div style="font-size:14px;font-weight:800;color:var(--g)">'+cnt+' <span style="font-size:11px;color:var(--t2)">('+pct+'%)</span></div>'
        +'</div><div class="gbar"><div class="gbf" style="width:'+pct+'%"></div></div>'+avgLine+'</div>';
    });
  }
  html+='<div class="slb">Asistencia por sabado'+(selYear?' - '+selYear:'')+'</div>';
  sabsFilt.forEach(function(s){
    var regs=REG[s.id]||{};var vin=0,pag=0;
    mis.forEach(function(n){var r=regs[n.id];if(r&&r.vino){vin++;if(r.pago)pag++;}});
    var pct=mis.length?Math.round(vin/mis.length*100):0;
    var col=pct>=70?'var(--g)':pct>=40?'var(--a)':'var(--r)';
    html+='<div class="card cb" style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
      +'<div><div style="font-size:15px;font-weight:700">'+fmt(s.fecha)+'</div>'
      +'<div style="font-size:12px;color:var(--t2)">$'+s.monto+(s.observacion?' - '+s.observacion:'')+'</div></div>'
      +'<span class="pill" style="background:var(--bg);color:var(--t1)">'+vin+' de '+mis.length+'</span></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'
      +'<span class="pill pb">'+vin+' vinieron</span>'
      +'<span class="pill '+(pag===vin?'pg':'pa')+'">'+pag+' pagaron</span>'
      +'<span style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--bg);color:'+col+'">'+pct+'%</span></div>'
      +'<div class="gbar"><div class="gbf" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
  });
  document.getElementById('s-stats').innerHTML=html;
}
window.setStatsYear=function(y){window._statsYear=y;renderStats();};

// ── ADMIN PANEL ──
function renderAdmin(){
  if(ME.rol!=='admin'){document.getElementById('s-admin').innerHTML='';return;}
  var html='<div class="slb">Gestionar contrasenas por grupo</div>'
    +'<div class="card">';
  DB.grupos.forEach(function(g){
    var resp=DB.usuarios.find(function(u){return u.id===g.responsableId;});
    html+='<div class="krow" onclick="editGrupoAdmin(\''+g.id+'\')">'
      +'<div class="av '+avc(g.id)+'" style="border-radius:10px">'+( g.nombre||'?')[0]+'</div>'
      +'<div class="ki"><div class="kn">'+g.nombre+'</div>'
      +'<div class="km">'+(resp?resp.nombre||resp.email:'Sin responsable')+'</div></div>'
      +'<span class="pill pb">'+( g.contrasena||'janijim123')+'</span></div>';
  });
  html+='</div>'
    +'<div class="slb">Usuarios activos</div><div class="card">';
  DB.usuarios.forEach(function(u){
    html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd)">'
      +'<div class="av '+avc(u.id)+'" style="border-radius:10px">'+( u.nombre||u.email||'?')[0].toUpperCase()+'</div>'
      +'<div class="ki"><div class="kn">'+(u.nombre||u.email)+'</div>'
      +'<div class="km">'+u.rol+(u.grupoId?' - '+( DB.grupos.find(function(g){return g.id===u.grupoId;})||{}).nombre||u.grupoId:'')+'</div></div>'
      +'<span class="pill '+(u.activo===false?'pr':'pg')+'">'+(u.activo===false?'Inactivo':'Activo')+'</span></div>';
  });
  html+='</div>';
  document.getElementById('s-admin').innerHTML=html;
}

window.editGrupoAdmin=function(gid){
  var g=DB.grupos.find(function(x){return x.id===gid;});if(!g)return;
  document.getElementById('ag-id').value=gid;
  document.getElementById('ag-nombre').value=g.nombre||'';
  document.getElementById('ag-pass').value=g.contrasena||'';
  document.getElementById('m-admin-grp-title').textContent='Editar: '+g.nombre;
  om('m-admin-grp');
};
window.saveGrupoAdmin=async function(){
  var gid=document.getElementById('ag-id').value;
  var nombre=document.getElementById('ag-nombre').value.trim();
  var pass=document.getElementById('ag-pass').value.trim();
  if(!nombre){toast('El nombre no puede estar vacio');return;}
  toast('Guardando...',4000);
  try{
    await updateDoc(doc(db,'grupos',gid),{nombre:nombre,contrasena:pass});
    cm('m-admin-grp');
    var g=DB.grupos.find(function(x){return x.id===gid;});
    if(g){g.nombre=nombre;g.contrasena=pass;}
    toast('Grupo actualizado');renderAdmin();
  }catch(e){toast('Error al guardar');}
};

// ── FAB & FORMS ──
window.onFab=function(){
  if(TAB==='hoy'){if(ME.rol==='admin')om('m-nsab');else toast('Solo el admin puede crear sabados');}
  else if(TAB==='ninos'){fillGS();om('m-nn');}
  else if(TAB==='deuda')window.showTab('ninos');
};

function fillGS(){
  var sel=document.getElementById('nn-g');var lbl=document.getElementById('nn-g-label');
  sel.innerHTML=DB.grupos.map(function(g){return '<option value="'+g.id+'">'+g.nombre+'</option>';}).join('');
  if(ME.rol==='admin'){sel.style.display='';lbl.style.display='none';}
  else{
    sel.value=ME.grupoId||'';sel.style.display='none';
    var g=DB.grupos.find(function(x){return x.id===ME.grupoId;});
    lbl.textContent='Grupo: '+(g?g.nombre:'Mi grupo');lbl.style.display='';
  }
}

window.crearSabado=async function(){
  var f=document.getElementById('ns-f').value;
  var m=parseFloat(document.getElementById('ns-m').value)||100;
  var o=document.getElementById('ns-o').value.trim();
  if(!f){toast('Selecciona una fecha');return;}
  toast('Creando...',5000);
  try{
    var ref=await addDoc(collection(db,'sabados'),{fecha:f,monto:m,observacion:o,creadoPor:ME.email||ME.id,creadoEn:serverTimestamp()});
    cm('m-nsab');document.getElementById('ns-f').value='';document.getElementById('ns-o').value='';
    await loadDB();SAB=DB.sabados.find(function(s){return s.id===ref.id;})||DB.sabados[0];
    if(SAB)subscribeRegistros(SAB.id);
    toast('Sabado creado');renderHoy();
  }catch(e){toast('Error al crear sabado');}
};

window.crearNino=async function(){
  var n=document.getElementById('nn-n').value.trim();
  var a=document.getElementById('nn-a').value.trim();
  var gid=document.getElementById('nn-g').value||ME.grupoId;
  if(!n||!a){toast('Completa nombre y apellido');return;}
  toast('Guardando...',5000);
  try{
    await addDoc(collection(db,'ninos'),{
      nombre:n,apellido:a,grupoId:gid,activo:true,
      escuela:document.getElementById('nn-esc').value.trim(),
      telefono:document.getElementById('nn-tel').value.trim(),
      creadoEn:serverTimestamp()
    });
    cm('m-nn');['nn-n','nn-a','nn-esc','nn-tel'].forEach(function(id){document.getElementById(id).value='';});
    await loadDB();toast('Janijim agregado');renderNinos();renderHoy();
  }catch(e){toast('Error al guardar');}
};

window.openEdit=function(nid){
  var n=DB.ninos.find(function(x){return x.id===nid;});if(!n)return;
  document.getElementById('edit-nid').value=nid;
  document.getElementById('edit-n').value=n.nombre||'';
  document.getElementById('edit-a').value=n.apellido||'';
  document.getElementById('edit-esc').value=n.escuela||'';
  document.getElementById('edit-tel').value=n.telefono||'';
  document.getElementById('edit-obs').value=n.observaciones||'';
  cm('m-kid');om('m-edit');
};
window.saveEdit=async function(){
  var nid=document.getElementById('edit-nid').value;
  var n=document.getElementById('edit-n').value.trim();
  var a=document.getElementById('edit-a').value.trim();
  if(!n||!a){toast('El nombre no puede estar vacio');return;}
  toast('Guardando...',4000);
  try{
    await updateDoc(doc(db,'ninos',nid),{
      nombre:n,apellido:a,
      escuela:document.getElementById('edit-esc').value.trim(),
      telefono:document.getElementById('edit-tel').value.trim(),
      observaciones:document.getElementById('edit-obs').value.trim()
    });
    cm('m-edit');
    var nd=DB.ninos.find(function(x){return x.id===nid;});
    if(nd){nd.nombre=n;nd.apellido=a;nd.escuela=document.getElementById('edit-esc').value.trim();nd.telefono=document.getElementById('edit-tel').value.trim();nd.observaciones=document.getElementById('edit-obs').value.trim();}
    await loadDB();toast('Datos actualizados');renderNinos();if(TAB==='hoy')renderHoy();
  }catch(e){toast('Error al guardar');}
};

window.om=om;window.cm=cm;

// ── INIT ──
async function init(){
  var ldiv=document.createElement('div');
  ldiv.style.cssText='color:rgba(255,255,255,.75);margin-top:20px;font-size:14px;display:flex;align-items:center;gap:8px';
  ldiv.innerHTML='<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite"></div>Cargando...';
  document.getElementById('auth').appendChild(ldiv);
  var ok=await loadDB();
  await loadAllRegs();
  ldiv.remove();
  if(!ok){
    var e=document.createElement('div');
    e.style.cssText='color:#fca5a5;margin-top:12px;font-size:13px;text-align:center;padding:0 20px';
    e.textContent='Sin conexion. Verifica tu internet.';
    document.getElementById('auth').appendChild(e);
  }
  try{
    var saved=JSON.parse(localStorage.getItem('jh_me_v3')||'null');
    if(saved){
      var fresh=DB.usuarios.find(function(u){return u.email&&u.email.toLowerCase()===saved.email.toLowerCase();});
      if(fresh){ME=fresh;showApp();if(SAB)subscribeRegistros(SAB.id);return;}
    }
  }catch(e){}
}
init();
</script>
